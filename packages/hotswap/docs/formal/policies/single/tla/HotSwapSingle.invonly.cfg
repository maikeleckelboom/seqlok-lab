\* TLC invariants-only configuration for HotSwapSingle.tla
\* Faster runs for development: safety checks only, no liveness properties.
\*
\* This mirrors the constants from HotSwapSingle.cfg so the state space is
\* comparable, but only invariants are checked.

CONSTANTS
    MAX_PREWARM_BLOCKS = 3
    MAX_FADE_FRAMES    = 8
    BLOCK_FRAMES       = 2
    MAX_STEP_INDEX     = 20000

SPECIFICATION
    Spec

\* Safety properties: must hold in every reachable state

INVARIANTS
    TypeOK
    AtMostTwoEngines
    NoGapDuringCrossfade
    NoOrphanedNextEngine
    PhaseTicketConsistency
    PrewarmCounterConsistency
    FadeFramesConsistency

\* Same behavioral bound as the full config, but without liveness checks

CONSTRAINT
    StepBound

