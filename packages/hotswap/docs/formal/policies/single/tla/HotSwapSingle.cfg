\* TLC configuration for HotSwapSingle.tla
\* Base single-swap protocol for the hotswap lane.
\*
\* Usually invoked via scripts/tla/run-hotswap.ts, but you can also run:
\*   java -jar tla2tools.jar \
\*     -config packages/hotswap/docs/formal/policies/single/tla/HotSwapSingle.cfg \
\*     packages/hotswap/docs/formal/policies/single/tla/HotSwapSingle.tla
\*
\* Constants are kept small so TLC can explore the space exhaustively.
\* Correctness depends on the protocol structure, not these exact values.

CONSTANTS
    MAX_PREWARM_BLOCKS = 3      \* Real systems might use 8–16
    MAX_FADE_FRAMES    = 8      \* Real systems might use 4096+
    BLOCK_FRAMES       = 2      \* Real systems use 128–1024
    MAX_STEP_INDEX     = 20000  \* Upper bound on stepIndex for TLC behaviors

\* Entry point of the behavior cpp

SPECIFICATION
    Spec

\* Safety properties: must hold in every reachable state

INVARIANTS
    TypeOK
    AtMostTwoEngines
    NoGapDuringCrossfade
    NoOrphanedNextEngine
    PhaseTicketConsistency
    PrewarmCounterConsistency
    FadeFramesConsistency

\* StepBound limits stepIndex so TLC does not explore unbounded-length behaviors

CONSTRAINT
    StepBound

\* Liveness / temporal properties checked over complete behaviors

PROPERTIES
    EventuallyIdle
    ProgressNeverDecreases
    NoLivelockPrewarm
    NoLivelockCrossfade

