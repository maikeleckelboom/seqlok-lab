\* TLC configuration for HotSwapRejectBusy.tla
\* Multi-swap cpp with reject-while-busy host policy, including liveness.
\*
\* Usually invoked via:
\*   pnpm tla:hotswap:full -- --policy reject-busy [-nowarning]
\*
\* Constants bound the number of completed swaps and crossfade lengths so TLC
\* can explore a rich but finite set of behaviors.

CONSTANTS
    \* Match the invariants config for a comparable behavior space:
    \* - Up to 2 prewarm blocks
    \* - Up to 4 fade frames
    \* - Up to 4 completed swaps per behavior
    MAX_PREWARM_BLOCKS = 2
    MAX_FADE_FRAMES    = 4
    BLOCK_FRAMES       = 2
    MAX_BEHAVIORS      = 4

    \* Three distinct engines (no aliasing between kinds)
    Engine1 = "Engine1"
    Engine2 = "Engine2"
    Engine3 = "Engine3"
    NoEngine = "NoEngine"

SPECIFICATION
    Spec

\* Safety properties over multi-swap histories

INVARIANTS
    TypeOK
    AtMostTwoEngines
    NoGapDuringCrossfade
    NextEngineConsistency
    CompletedSwapsConsistency
    SequentialSwapsComplete

\* BehaviorBound constrains the number of completed swaps per behavior

CONSTRAINT
    BehaviorBound

\* Liveness: every accepted swap eventually completes and the system
\* does not get stuck in prewarm or crossfade phases.

PROPERTIES
    EventuallyIdle
    MultipleSwapsComplete
    NoLivelockPrewarm
    NoLivelockCrossfade

