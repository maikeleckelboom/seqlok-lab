\* Configuration file for TLC model checker
\* Run with: tlc HotSwapProtocol.tla -config HotSwapProtocol.cfg

\* ============================================================================
\* CONSTANTS
\* ============================================================================
\* Keep these small for tractable model checking.
\* The protocol's correctness doesn't depend on large values.
\* We are checking the *structure* of transitions, not scale.


CONSTANTS
    MAX_PREWARM_BLOCKS = 3      \* Real systems might use 8-16
    MAX_FADE_FRAMES    = 8      \* Real systems might use 4096+
    BLOCK_FRAMES       = 2      \* Real systems use 128-1024
    MAX_STEP_INDEX     = 20000  \* Upper bound on stepIndex for TLC behaviors

\* ============================================================================
\* SPECIFICATION
\* ============================================================================

SPECIFICATION
    Spec

\* ============================================================================
\* INVARIANTS (Safety)
\* ============================================================================

INVARIANTS
    TypeOK
    AtMostTwoEngines
    NoGapDuringCrossfade
    NoOrphanedNextEngine
    PhaseTicketConsistency
    PrewarmCounterConsistency
    FadeFramesConsistency

\* ============================================================================
\* BEHAVIOR CONSTRAINTS
\* ============================================================================
\* StepBound keeps individual behaviors finite by bounding stepIndex.
\* This reduces the chance of TLC hitting its 65535-state behavior limit.
CONSTRAINT
    StepBound

\* ============================================================================
\* PROPERTIES (Liveness / Temporal)
\* ============================================================================
\* TLC checks these hold over all behaviors (sequences of states)

PROPERTIES
    EventuallyIdle
    ProgressNeverDecreases
    NoLivelockPrewarm
    NoLivelockCrossfade
